# deploy.yml — Stage a preview, then deploy to production after approval.
#
# Triggers:
#   - repository_dispatch from the plugin repo's release workflow
#   - workflow_dispatch for manual re-deploys (e.g. after a page update)
#
# Required GitHub Secrets:
#   PLUGIN_REPO_TOKEN     Fine-grained PAT with contents:read on the plugin repo
#   CLOUDFLARE_API_TOKEN  Cloudflare API token scoped to Pages
#   CLOUDFLARE_ACCOUNT_ID Cloudflare account identifier
#
# Required GitHub Environment:
#   "production" with required reviewers — gates the deploy-production job

name: Deploy Alpha Page

on:
  repository_dispatch:
    types: [release-published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.9-alpha.1). Leave empty to use the latest release."
        required: false

jobs:
  stage:
    name: Stage preview
    runs-on: ubuntu-latest
    outputs:
      has_release: ${{ steps.release.outputs.has_release }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.PLUGIN_REPO_TOKEN }}
        run: |
          # Accept tag from dispatch payload, workflow input, or fall back to latest.
          TAG="${{ github.event.client_payload.tag || github.event.inputs.tag }}"

          if [ -z "$TAG" ]; then
            echo "No tag specified — resolving latest release"
            if ! OUTPUT=$(gh release view \
              --repo the-arrangement-studio/AudioOnlyPOC \
              --json tagName,publishedAt,assets 2>&1); then
              if echo "$OUTPUT" | grep -q "release not found"; then
                echo "No releases found — will deploy placeholder page"
                echo "has_release=false" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "::error::Failed to fetch release info: $OUTPUT"
                exit 1
              fi
            fi
            echo "$OUTPUT" > /tmp/release.json
          else
            gh release view "$TAG" \
              --repo the-arrangement-studio/AudioOnlyPOC \
              --json tagName,publishedAt,assets > /tmp/release.json
          fi

          echo "has_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$(jq -r '.tagName' /tmp/release.json)" >> "$GITHUB_OUTPUT"
          echo "date=$(jq -r '.publishedAt | split("T")[0]' /tmp/release.json)" >> "$GITHUB_OUTPUT"
          echo "arm64_name=$(jq -r '[.assets[] | select(.name | test("arm64"))][0].name // ""' /tmp/release.json)" >> "$GITHUB_OUTPUT"
          echo "x86_64_name=$(jq -r '[.assets[] | select(.name | test("x86_64"))][0].name // ""' /tmp/release.json)" >> "$GITHUB_OUTPUT"
          echo "win64_name=$(jq -r '[.assets[] | select(.name | test("\\.exe$"))][0].name // ""' /tmp/release.json)" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        if: steps.release.outputs.has_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.PLUGIN_REPO_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          mkdir -p site

          gh release download "$TAG" \
            --repo the-arrangement-studio/AudioOnlyPOC \
            --pattern "*.dmg" --pattern "*.exe" \
            --dir site/

          echo "Downloaded assets:"
          ls -lh site/

      - name: Build page
        run: |
          mkdir -p site
          cp index.html site/index.html

          HAS_RELEASE="${{ steps.release.outputs.has_release }}"
          sed -i "s|__HAS_RELEASE__|${HAS_RELEASE}|g" site/index.html
          sed -i "s|__RELEASE_TAG__|${{ steps.release.outputs.tag }}|g" site/index.html
          sed -i "s|__RELEASE_DATE__|${{ steps.release.outputs.date }}|g" site/index.html
          sed -i "s|__RELEASE_FILE_ARM64__|${{ steps.release.outputs.arm64_name }}|g" site/index.html
          sed -i "s|__RELEASE_FILE_X86_64__|${{ steps.release.outputs.x86_64_name }}|g" site/index.html
          sed -i "s|__RELEASE_FILE_WIN64__|${{ steps.release.outputs.win64_name }}|g" site/index.html

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
          retention-days: 3

      - name: Deploy staging preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/ --project-name=afterloop-alpha --branch=staging

      - name: Post preview link
        run: |
          echo "## Staging Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.release.outputs.has_release }}" = "true" ]; then
            echo "**Release:** \`${{ steps.release.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Release:** none (placeholder page)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Preview:** https://staging.afterloop-alpha.pages.dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Approve the **deploy-production** job to push this live." >> $GITHUB_STEP_SUMMARY

  deploy-production:
    name: Deploy to production
    needs: stage
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/ --project-name=afterloop-alpha --branch=main

      - name: Post production link
        run: |
          echo "## Production Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TAG="${{ needs.stage.outputs.tag }}"
          if [ -n "$TAG" ]; then
            echo "Release \`$TAG\` is now live at:" >> $GITHUB_STEP_SUMMARY
          else
            echo "Placeholder page is now live at:" >> $GITHUB_STEP_SUMMARY
          fi
          echo "https://afterloop-alpha.pages.dev" >> $GITHUB_STEP_SUMMARY
